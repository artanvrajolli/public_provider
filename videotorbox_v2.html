<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTBox</title>
    <style>
        body,
        html {
            margin: 0px;
            padding: 0px;
            background: black;
            max-height: 100dvh;
            max-width: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
        }

        #loading {
            color: white;
            text-align: center;
            position: absolute;
            z-index: 2;
            top: 50%;
            left: 50%;
            width: min(520px, calc(100% - 48px));
            transform: translate(-50%, -50%);
            font: 16px/1.4 system-ui, sans-serif;
        }

        #status {
            margin-bottom: 12px;
        }

        #progress-track {
            height: 12px;
            overflow: hidden;
            border: 1px solid #555;
            border-radius: 999px;
            background: #222;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #2388ff, #69b4ff);
            transition: width .4s ease;
        }

        #progress-label {
            margin-top: 8px;
            color: #bbb;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div id="loading">
        <div id="status">Starting TorBox download...</div>
        <div id="progress-track"><div id="progress-bar"></div></div>
        <div id="progress-label">0%</div>
    </div>
    <video id="video" preload="auto" controls autoplay></video>
</body>

<script type="module">

    function updateStatus(message) {
        const statusElement = document.getElementById('status');
        statusElement.textContent = message;
    }

    function updateProgress(progress = 0, state = 'waiting') {
        const percentage = Math.max(0, Math.min(100, Number(progress) * 100));
        document.getElementById('progress-bar').style.width = percentage + '%';
        document.getElementById('progress-label').textContent =
            Math.round(percentage * 10) / 10 + '% · ' + state;
    }

    function hideProgress() {
        document.getElementById('loading').style.display = 'none';
    }

    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const targetUrl = params.get('target_url');
    const existingWebId = params.get('web_id');
    const cleanupOwner = params.get('cleanup');

    if (!token || (!targetUrl && !existingWebId)) {
        updateStatus('Missing token or target_url/web_id parameter.', false);
        throw new Error('Missing token or target_url/web_id parameter.');
    }

    // Simple helper to go through the CORS proxy
    async function fetchJSON(rawUrl, options = {}) {
        const proxied = 'https://corsnova.vercel.app/' + encodeURIComponent(rawUrl);
        const res = await fetch(proxied, options);
        let data;
        try { data = await res.json(); } catch { data = null; }
        return { ok: res.ok, status: res.status, data };
    }

    async function createWebDownloadIfNeeded() {
        const { ok, status, data } = await fetchJSON('https://api.torbox.app/v1/api/webdl/createwebdownload', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'x-Authorization': 'Bearer ' + token
            },
            body: new URLSearchParams({
                link: decodeURIComponent(targetUrl)
            }).toString()
        });

        return data?.data.webdownload_id;
    }

    async function requestDirectLink(web_id_response) {
        while (true) {
            const statusResponse = await fetchJSON(
                'https://api.torbox.app/v1/api/webdl/mylist?id=' + encodeURIComponent(web_id_response) + '&bypass_cache=true',
                { headers: { 'x-Authorization': 'Bearer ' + token } }
            );
            const webDownload = statusResponse.data?.data;
            const state = webDownload?.download_state || 'preparing';
            updateProgress(webDownload?.progress || 0, state);
            updateStatus(state === 'downloading'
                ? 'TorBox is downloading the video...'
                : 'TorBox is preparing the video...');

            const { data } = await fetchJSON('https://api.torbox.app/v1/api/webdl/requestdl?web_id=' + encodeURIComponent(web_id_response) + '&token=' + encodeURIComponent(token));
            if (data?.success && data?.data) {
                const video = document.getElementById('video');
                video.src = data.data;
                await video.play().catch(() => { });
                updateProgress(1, 'ready');
                hideProgress();
                return;
            }

            await new Promise(resolve => setTimeout(resolve, 5000));
        }
    }

    async function cleanup(web_id) {
        const myHeaders = new Headers();
        myHeaders.append("x-Authorization", "Bearer " + token);
        myHeaders.append("Content-Type", "application/json");

        const raw = JSON.stringify({
            "webdl_id": web_id,
            "operation": "delete",
            "all": false
        });

        const requestOptions = {
            method: "POST",
            headers: myHeaders,
            body: raw,
            redirect: "follow"
        };

        return fetch("https://corsnova.vercel.app/"+encodeURIComponent("https://api.torbox.app/v1/api/webdl/controlwebdownload"), requestOptions)
            .then((response) => response.text())
            .then((result) => console.log(result))
            .catch((error) => console.error(error));
    }

    let web_id_response = existingWebId || await createWebDownloadIfNeeded();
    if (!web_id_response) {
        updateStatus('Failed to create TorBox WebDL.', false);
        throw new Error('Failed to create TorBox WebDL.');
    }

    // Standalone use cleans up in the browser. n8n workflows own cleanup when
    // cleanup=n8n, so closing the player cannot prevent deletion.
    if (cleanupOwner !== 'n8n') {
        setTimeout(() => cleanup(web_id_response), 30 * 60 * 1000);
    }
    await requestDirectLink(web_id_response);


</script>

</html>
